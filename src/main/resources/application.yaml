spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sneaker_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # auto creates tables
    show-sql: true            # shows SQL in console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  application:
    name: sneaker-store

server:
  port: 8080

